# Copyright Chad Engler

id = "he.window"
name = "Harvest Windowing"
description = "Windowing and input utilities for creating cross-platform windowed applications."
version = "0.1.0"
authors = ["Chad Engler <englercj@live.com>"]
license = "UNLICENSED"
homepage = ""

[[modules]]
    name = "he_window"
    type = "static"
    group = "engine/libs"
    files = ["include/**", "src/**", "wasm/**"]
    public_dependson = ["he_core", "he_math"]
    public_includedirs = ["include"]
    private_includedirs = ["src"]

    [[modules.variants]]
        conditions = ["system:linux"]
        public_dependson = ["sys:dl"]

[[modules]]
    name = "he_window_test_app"
    type = "windowed_app"
    group = "engine/tests"
    files = ["test_app/**"]
    removefiles = ["test_app/wasm/node_modules/**"]
    private_dependson = ["he_core", "he_window"]

    [[modules.variants]]
        conditions = ["system:wasm", "files:test_app/wasm/webpack.config.js"]
        buildmessage = "Building webpack project..."
        buildcommands = [
            "cd %{file.directory} && %{!he.get_npmjs_path()} install --quiet && cd %{file.directory} && %{!he.get_npmjs_path()} run build -- --env outPath=\"%{!cfg.linktarget.directory}\"",
        ]
        buildinputs = [
            "test_app/wasm/index.ts",
            "test_app/wasm/index.ejs",
            "test_app/wasm/package.json",
            "test_app/wasm/tsconfig.json",
            "test_app/wasm/webpack.config.js",
        ]
        buildoutputs = [
            "%{cfg.linktarget.directory}/he_window_test_app.js",
            "%{cfg.linktarget.directory}/he_window_test_app.html",
        ]
