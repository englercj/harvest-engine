# Copyright Chad Engler

id = "llvm.libcxxabi"
name = "C++ Standard Library"
description = "An implementation of the C++ standard library, targeting C++11 and above."
version = "18.1.2"
authors = []
license = "Apache-2.0 WITH LLVM-exception"
homepage = "https://github.com/llvm/llvm-project"

[install]
    base_path = "libcxxabi-18.1.2.src"
    archive = "https://github.com/llvm/llvm-project/releases/download/llvmorg-18.1.2/libcxxabi-18.1.2.src.tar.xz"
    valid_targets = ["wasm"]

[[modules]]
    name = "libcxxabi"
    type = "static"
    group = "engine/contrib"
    warnings = "Off"
    files = [
        # Includes
        "include/cxxabi.h",

        # C++ABI files
        "src/cxa_aux_runtime.cpp",
        "src/cxa_default_handlers.cpp",
        "src/cxa_demangle.cpp",
        "src/cxa_exception_storage.cpp",
        "src/cxa_guard.cpp",
        "src/cxa_handlers.cpp",
        "src/cxa_vector.cpp",
        "src/cxa_virtual.cpp",

        # C++ STL files
        "src/stdlib_exception.cpp",
        "src/stdlib_stdexcept.cpp",
        "src/stdlib_typeinfo.cpp",

        # Internal files
        "src/abort_message.cpp",
        "src/fallback_malloc.cpp",
        "src/private_typeinfo.cpp",

        # New/Delete definitions
        "src/stdlib_new_delete.cpp",

        # Exceptions / No exceptions
        "src/cxa_noexception.cpp",
        # "src/cxa_exception.cpp",
        # "src/cxa_personality.cpp",

        # Threads
        "src/cxa_thread_atexit.cpp",
    ]
    public_externalincludedirs = ["include"]
