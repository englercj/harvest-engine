# Copyright Chad Engler

id = "he.math"
name = "Harvest Math"
description = "Collection of common math funcitons and accelerated vector/matrix structures."
version = "0.1.0"
authors = ["Chad Engler <englercj@live.com>"]
license = "UNLICENSED"
homepage = ""

[[modules]]
    name = "he_math"
    type = "header"
    group = "engine/libs"
    files = ["include/**", "src/**"]
    public_dependson = ["he_core"]
    public_includedirs = ["include"]

    [modules.docs]
        inputs = ["include"]

[[modules]]
    name = "he_math_tests"
    type = "static"
    group = "engine/tests"
    files = ["test/**"]
    private_dependson = ["he_math"]
