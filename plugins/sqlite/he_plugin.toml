# Copyright Chad Engler

id = "he.sqlite"
name = "Harvest SQLite"
description = "SQLite wrappers for easily and safely using SQLite3 in C++."
version = "0.1.0"
authors = ["Chad Engler <englercj@live.com>"]
license = "UNLICENSED"
homepage = ""

[[modules]]
    name = "he_sqlite"
    type = "static"
    group = "engine/libs"
    files = ["include/**", "src/**"]
    public_dependson = ["he_core", "sqlite3"]
    public_includedirs = ["include"]
    private_includedirs = ["src"]

[[modules]]
    name = "he_sqlite_tests"
    type = "static"
    group = "engine/tests"
    files = ["test/**"]
    public_dependson = ["he_sqlite"]
    private_includedirs = ["src"]
