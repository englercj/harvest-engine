# Copyright Chad Engler

id = "he.editor"
name = "Harvest Editor"
description = "Harvest editor application."
version = "1.0.0"
author = "Chad Engler <englercj@live.com>"
license = "UNLICENSED"
homepage = ""

[[modules]]
    name = "he_editor"
    type = "windowed_app"
    group = "engine/tools"
    files = ["src/**"]
    public_includedirs = ["src", "%{he.get_generated_dir('he_editor')}/src"]
    private_defines = ["GOOGLE_PROTOBUF_INTERNAL_DONATE_STEAL_INLINE=0"]
    private_dependson = [
        "he_asset_editor",
        "he_asset_runtime",
        "he_core",
        "he_math",
        "he_rhi",
        "he_schema",
        "he_window",

        "boost_di",
        "imgui",
        "sqlite3",
    ]

    [[modules.bin2c_compile]]
        glob = "src/fonts/**.ttf"
        compress = true

    [[modules.bin2c_compile]]
        glob = "src/fonts/**.woff2"
        compress = false

    [[modules.schema_compile]]
        glob = "src/schema/*.hsc"
        targets = ["c++"]
        dependson_include = ["he_asset_runtime", "he_schema"]

    [[modules.variants]]
        conditions = ["system:windows"]
        disablewarnings = ["4127", "5054"]
        public_dependson = ["sys:Shlwapi"]

        [[modules.variants.shader_compile]]
            glob = "src/shaders/*.hlsl"
            targets = ["sm_5_1"]

    [[modules.variants]]
        conditions = ["system:linux"]

        [[modules.variants.shader_compile]]
            glob = "src/shaders/*.hlsl"
            targets = ["glsl_450"]
