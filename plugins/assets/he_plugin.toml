# Copyright Chad Engler

id = "he.assets"
name = "Harvest Asset Editor Library"
description = "Core asset system plugin. Includes runtime asset management, editing facilities, and basic asset types."
version = "1.0.0"
author = "Chad Engler <englercj@live.com>"
license = "UNLICENSED"
homepage = ""

[[modules]]
    name = "he_asset_runtime"
    type = "static"
    group = "engine/libs"
    files = ["asset_runtime/include/**", "asset_runtime/src/**"]
    public_dependson = ["he_core", "he_schema"]
    public_includedirs = ["asset_runtime/include", "%{he.get_generated_dir('he_asset_runtime')}/asset_runtime/include"]
    private_includedirs = ["asset_runtime/src", "%{he.get_generated_dir('he_asset_runtime')}/asset_runtime/src"]

    [[modules.schema_compile]]
        glob = "**.hsc"
        targets = ["c++"]
        dependson_include = ["he_schema"]

[[modules]]
    name = "he_asset_editor"
    type = "static"
    group = "engine/libs"
    files = ["asset_editor/include/**", "asset_editor/src/**"]
    public_dependson = ["he_asset_runtime", "he_core", "he_schema", "he_sqlite", "basis_universal"]
    public_includedirs = ["asset_editor/include", "%{he.get_generated_dir('he_asset_editor')}/asset_editor/include"]
    private_includedirs = ["asset_editor/src", "%{he.get_generated_dir('he_asset_editor')}/asset_editor/src"]

    [[modules.bin2c_compile]]
        glob = "**.sql"
        text = true

    [[modules.variants]]
        conditions = ["system:windows"]
        public_dependson = ["sys:Shlwapi"]
