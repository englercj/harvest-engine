# Copyright Chad Engler

id = "he.core"
name = "Harvest Core"
description = "Core utilities and platform abstractions."
version = "0.1.0"
authors = ["Chad Engler <englercj@live.com>"]
license = "UNLICENSED"
homepage = ""

# Base core module that provides commonly used utilities and platform abstractions.
[[modules]]
    name = "he_core"
    type = "static"
    group = "engine/libs"
    files = ["include/**", "src/**", "debugger/**"]
    public_dependson = ["libbase64", "mimalloc"]
    public_includedirs = ["include"]
    private_includedirs = ["src"]

    [modules.docs]
        inputs = ["include"]

    [[modules.variants]]
        conditions = ["system:linux"]
        public_dependson = ["sys:dl", "sys:dw", "sys:pthread", "sys:unwind", "sys:uring"]
        public_defines = [
            "HE_IMPL_PLATFORM_RWLOCK_SIZE=56",
            "HE_IMPL_PLATFORM_MUTEX_SIZE=40",
            "HE_IMPL_PLATFORM_RECURSIVE_MUTEX_SIZE=40",
            "HE_IMPL_PLATFORM_CONDITION_VARIABLE_SIZE=48",
            "HE_IMPL_PLATFORM_SEMAPHORE_SIZE=32",
            "HE_IMPL_PLATFORM_SYNC_EVENT_SIZE=12",
        ]

    [[modules.variants]]
        conditions = ["system:posix", "system:not linux"]
        public_dependson = ["sys:dl", "sys:pthread"]
        public_defines = [
            "HE_IMPL_PLATFORM_RWLOCK_SIZE=56",
            "HE_IMPL_PLATFORM_MUTEX_SIZE=40",
            "HE_IMPL_PLATFORM_RECURSIVE_MUTEX_SIZE=40",
            "HE_IMPL_PLATFORM_CONDITION_VARIABLE_SIZE=48",
            "HE_IMPL_PLATFORM_SEMAPHORE_SIZE=32",
            "HE_IMPL_PLATFORM_SYNC_EVENT_SIZE=92",
        ]

    [[modules.variants]]
        conditions = ["system:wasm"]
        public_dependson = ["he_core_wasm_libc"]
        public_wasmfeatures = ["Atomics", "BulkMemory", "NontrappingFPToInt"]
        public_defines = [
            "HE_IMPL_PLATFORM_RWLOCK_SIZE=4",
            "HE_IMPL_PLATFORM_MUTEX_SIZE=4",
            "HE_IMPL_PLATFORM_RECURSIVE_MUTEX_SIZE=8",
            "HE_IMPL_PLATFORM_CONDITION_VARIABLE_SIZE=12",
            "HE_IMPL_PLATFORM_SEMAPHORE_SIZE=4",
            "HE_IMPL_PLATFORM_SYNC_EVENT_SIZE=20",
        ]

    [[modules.variants]]
        conditions = ["system:win32"]
        public_dependson = ["sys:Shlwapi", "sys:User32", "sys:Kernel32"]
        public_defines = [
            "HE_IMPL_PLATFORM_RWLOCK_SIZE=8",
            "HE_IMPL_PLATFORM_MUTEX_SIZE=8",
            "HE_IMPL_PLATFORM_RECURSIVE_MUTEX_SIZE=40",
            "HE_IMPL_PLATFORM_CONDITION_VARIABLE_SIZE=8",
            "HE_IMPL_PLATFORM_SEMAPHORE_SIZE=8",
            "HE_IMPL_PLATFORM_SYNC_EVENT_SIZE=8",
        ]

    [[modules.variants]]
        conditions = ["system:windows"]
        public_dependson = ["DirectStorage"]

# Minimal libc implementation for wasm.
[[modules]]
    name = "he_core_wasm_libc"
    type = "static"
    group = "engine/libs"

    [[modules.variants]]
        conditions = ["system:wasm"]
        files = ["wasm_libc/include/**", "wasm_libc/src/**"]
        public_dependson_include = ["he_core"]
        public_externalincludedirs = [
            # Libcxx headers must come before wasm_libc headers.
            "%{he.get_plugin('llvm.libcxx')._install_dirs['*']}/include",
            "wasm_libc/include"
        ]
        public_defines = [
            "HE_LIBCPP_ABI_NAMESPACE=__%{he.get_libcxx_abi_version()}",
        ]
        private_includedirs = ["wasm_libc/src"]

# Tests for the core module.
[[modules]]
    name = "he_core_tests"
    type = "static"
    group = "engine/tests"
    files = ["test/**"]
    public_dependson = ["he_core"]
    private_includedirs = ["src"]

# This is a console app that links all test projects and runs them.
[[modules]]
    name = "he_test_runner"
    type = "console_app"
    group = "engine/tests"
    files = ["test_runner/main.cpp"]
    public_dependson = ["he_core"]
    exec = "test_runner/link_test_projects.lua"
