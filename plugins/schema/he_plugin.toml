# Copyright Chad Engler

id = "he.schema"
name = "Harvest Schema"
description = "Harvest Schema language parsing, code generation, and tooling."
version = "0.1.0"
author = "Chad Engler <englercj@live.com>"
license = "UNLICENSED"
homepage = ""

[install]
    exec = "schemac.lua"

# Schema core runtime library
[[modules]]
    name = "he_schema"
    type = "static"
    group = "engine/libs"
    files = ["schema/include/**", "schema/src/**"]
    public_dependson = ["he_core", "toml++"]
    public_includedirs = ["schema/include"]
    private_includedirs = ["schema/src"]

# Schema compiler library
[[modules]]
    name = "he_schema_compiler"
    type = "static"
    group = "engine/libs"
    files = ["schema_compiler/include/**", "schema_compiler/src/**"]
    public_dependson = ["he_core", "he_schema"]
    public_includedirs = ["schema_compiler/include"]
    private_includedirs = ["schema_compiler/src"]

# Schema compiler executable
[[modules]]
    name = "he_schemac"
    type = "console_app"
    group = "engine/tools"
    files = ["schemac/**"]
    private_dependson = ["he_core", "he_schema", "he_schema_compiler"]

# Tests for schema core library
[[modules]]
    name = "he_schema_tests"
    type = "static"
    group = "engine/tests"
    files = ["schema/test/**"]
    public_dependson = ["he_schema"]
    private_includedirs = ["schema/src"]

# Tests for schema compiler library
[[modules]]
    name = "he_schema_compiler_tests"
    type = "static"
    group = "engine/tests"
    files = ["schema_compiler/test/**"]
    public_dependson = ["he_schema_compiler"]
    private_includedirs = ["schema_compiler/src"]
