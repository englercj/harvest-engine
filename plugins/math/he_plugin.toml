id = "he.math"
name = "Harvest Math"
description = "Provides math utilities used throughout the engine."
version = "1.0.0"
author = "Chad Engler <englercj@live.com>"
license = "UNLICENSED"

[[modules]]
    name = "he_math"
    type = "header"
    group = "engine/libs"
    files = ["include/**", "src/**"]
