# Copyright Chad Engler

id = "he.editor"
name = "Harvest Editor"
description = "Harvest Editor application."
version = "0.1.0"
authors = ["Chad Engler <englercj@live.com>"]
license = "UNLICENSED"
homepage = ""

[[modules]]
    name = "he_editor"
    type = "windowed_app"
    group = "engine/tools"
    files = ["include/**", "src/**"]
    public_includedirs = ["include", "%{he.get_generated_dir('he_editor')}/include"]
    private_includedirs = ["src", "%{he.get_generated_dir('he_editor')}/src"]
    public_dependson = [
        "boost_di",
        "he_assets",
        "he_assets_editor",
        "he_core",
        "he_math",
        "he_rhi",
        "he_schema",
        "he_window",
        "imgui",
        "implot",
    ]

    [[modules.bin2c_compile]]
        scope = "private"
        files = ["src/fonts/**.ttf"]
        includedirs = ["src"]
        compress = true

    [[modules.schema_compile]]
        scope = "public"
        files = ["include/**.hsc"]
        includedirs = ["include"]
        targets = ["c++"]

    [[modules.variants]]
        conditions = ["system:windows"]
        disablewarnings = ["4127", "5054"]
        public_dependson = ["sys:Shlwapi"]

        [[modules.variants.shader_compile]]
            scope = "private"
            files = ["src/shaders/*.slang"]
            includedirs = ["src/shaders"]
            targets = ["sm_6_0"]

    [[modules.variants]]
        conditions = ["system:linux"]

        [[modules.variants.shader_compile]]
            scope = "private"
            files = ["src/shaders/*.slang"]
            includedirs = ["src/shaders"]
            targets = ["glsl_450"]
