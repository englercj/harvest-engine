# Copyright Chad Engler

id = "he.core"
name = "Harvest Core"
description = "Core utilities and platform abstractions."
version = "0.1.0"
authors = ["Chad Engler <englercj@live.com>"]
license = "UNLICENSED"
homepage = ""

[[modules]]
    name = "he_core"
    type = "static"
    group = "engine/libs"
    files = ["include/**", "src/**", "debugger/**"]
    public_dependson = ["dragonbox", "libbase64"]
    public_includedirs = ["include"]
    private_includedirs = ["src"]

    [modules.docs]
        inputs = ["include"]

    [[modules.variants]]
        conditions = ["system:linux"]
        public_dependson = ["sys:dl", "sys:dw", "sys:pthread", "sys:unwind", "sys:uring"]
        public_defines = [
            "HE_PLATFORM_RWLOCK_SIZE=56",
            "HE_PLATFORM_MUTEX_SIZE=40",
            "HE_PLATFORM_RECURSIVE_MUTEX_SIZE=40",
            "HE_PLATFORM_CONDITION_VARIABLE_SIZE=48",
            "HE_PLATFORM_SEMAPHORE_SIZE=32",
            "HE_PLATFORM_SYNC_EVENT_SIZE=12",
        ]

    [[modules.variants]]
        conditions = ["system:posix", "system:not linux"]
        public_dependson = ["sys:dl", "sys:pthread"]
        public_defines = [
            "HE_PLATFORM_RWLOCK_SIZE=56",
            "HE_PLATFORM_MUTEX_SIZE=40",
            "HE_PLATFORM_RECURSIVE_MUTEX_SIZE=40",
            "HE_PLATFORM_CONDITION_VARIABLE_SIZE=48",
            "HE_PLATFORM_SEMAPHORE_SIZE=32",
            "HE_PLATFORM_SYNC_EVENT_SIZE=92",
        ]

    [[modules.variants]]
        conditions = ["system:win32"]
        public_defines = [
            "HE_PLATFORM_RWLOCK_SIZE=8",
            "HE_PLATFORM_MUTEX_SIZE=8",
            "HE_PLATFORM_RECURSIVE_MUTEX_SIZE=40",
            "HE_PLATFORM_CONDITION_VARIABLE_SIZE=8",
            "HE_PLATFORM_SEMAPHORE_SIZE=8",
            "HE_PLATFORM_SYNC_EVENT_SIZE=8",
        ]

    [[modules.variants]]
        conditions = ["system:windows"]
        public_dependson = ["DirectStorage"]

[[modules]]
    name = "he_core_tests"
    type = "static"
    group = "engine/tests"
    files = ["test/**"]
    public_dependson = ["he_core"]
    private_includedirs = ["src"]

[[modules]]
    name = "he_test_runner"
    type = "console_app"
    group = "engine/tests"
    files = ["test_runner/main.cpp"]
    public_dependson = ["he_core"]
    exec = "test_runner/link_test_projects.lua"
