name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config: [debug, release]
        arch: [x64]
    steps:
    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential binutils-dev libdw-dev libx11-dev libxi-dev liburing-dev
        sudo update-alternatives --set gcc /usr/bin/gcc-12
        sudo update-alternatives --set g++ /usr/bin/g++-12
        sudo update-alternatives --set clang /usr/bin/clang-12
        sudo update-alternatives --set clang++ /usr/bin/clang++-12
        sudo update-alternatives --install /usr/bin/llvm-ar llvm-ar /usr/bin/llvm-ar-12 100
    - name: Checkout
      uses: actions/checkout@v2
    - name: Bootstrap
      run: ./bootstrap.sh
    - name: Build
      run: cd build && make -j$(nproc) config=${{ matrix.config }}_${{ matrix.arch }}
    - name: Test
      run: ./build/bin/linux-${{ matrix.config }}_${{ matrix.arch }}/he_test_runner
  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        config: [debug, release]
        arch: [x64]
    steps:
    - name: Checkout
      uses: actions/checkout@v2
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.0.2
    - name: Bootstrap
      run: ./bootstrap.sh
      shell: bash
    - name: Build
      run: MSBuild.exe build/harvest-engine_windows.sln /m /p:Configuration="${{ matrix.config }}" /p:Platform="${{ matrix.arch }}" /nodeReuse:false
    - name: Test
      if: ${{ matrix.arch == 'x64' }}
      run: ./build/windows-x86_64-${{ matrix.config }}/bin/he_test_runner.exe
