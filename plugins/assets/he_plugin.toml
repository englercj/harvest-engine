# Copyright Chad Engler

id = "he.assets"
name = "Harvest Asset System"
description = "Provides utilities for managing assets in the engine."
version = "1.0.0"
author = "Chad Engler <englercj@live.com>"
license = "UNLICENSED"
homepage = ""

[[modules]]
    name = "he_assets"
    type = "static"
    group = "engine/libs"
    files = ["include/**", "src/**"]
    public_dependson = ["he_core", "he_schema", "he_sqlite"]
    public_includedirs = ["include", "%{he.get_generated_dir('he_assets')}/include"]
    private_includedirs = ["src", "%{he.get_generated_dir('he_assets')}/src"]

    [[modules.bin2c_compile]]
        glob = "**.sql"
        text = true

    [[modules.schema_compile]]
        glob = "**.hsc"
        targets = ["c++"]
        dependson_include = ["he_schema"]

    [[modules.variants]]
        conditions = ["system:win32"]
        public_dependson = ["sys:Shlwapi"]
