# Copyright Chad Engler

id = "epezent.implot"
name = "ImPlot"
description = "ImPlot is an immediate mode, GPU accelerated plotting library for Dear ImGui."
version = "0.14"
author = "Evan Pezent"
license = "MIT"
homepage = "https://github.com/epezent/implot"

[install]
    github = "epezent/implot#v0.14"

[[modules]]
    name = "implot"
    type = "static"
    group = "engine/contrib"
    files = [
        "implot.cpp",
        "implot.h",
        "implot_demo.cpp",
        "implot_internal.h",
        "implot_items.cpp",
    ]
    public_dependson = ["imgui"]
    public_includedirs = ["."]
