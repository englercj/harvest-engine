    public_externalincludedirs = ["c++/src"]
    public_dependson = ["kj", "kj_async", "capnp"]
    warnings = "Off"

# Capnp websocket library
[[modules]]
    name = "capnp_websocket"
    type = "static"
    group = "engine/contrib"
    files = [
        # sources
        "c++/src/capnp/compat/websocket-rpc.c++",

        # headers
        "c++/src/capnp/compat/websocket-rpc.h",
    ]
    public_externalincludedirs = ["c++/src"]
    public_dependson = ["kj", "kj_async", "kj_http", "capnp"]
    warnings = "Off"

# Capnp compiler library
[[modules]]
    name = "capnp_compiler"
    type = "static"
    group = "engine/contrib"
    files = [
        "c++/src/capnp/compiler/type-id.c++",
        "c++/src/capnp/compiler/error-reporter.c++",
        "c++/src/capnp/compiler/lexer.capnp.c++",
        "c++/src/capnp/compiler/lexer.c++",
        "c++/src/capnp/compiler/grammar.capnp.c++",
        "c++/src/capnp/compiler/parser.c++",
        "c++/src/capnp/compiler/generics.c++",
        "c++/src/capnp/compiler/node-translator.c++",
        "c++/src/capnp/compiler/compiler.c++",
        "c++/src/capnp/schema-parser.c++",
        "c++/src/capnp/serialize-text.c++",
    ]
    public_externalincludedirs = ["c++/src"]
    public_dependson = ["kj", "capnp"]
    warnings = "Off"

# Capnp compiler tool
[[modules]]
    name = "capnp_tool"
    targetname = "capnp"
    type = "console_app"
    group = "engine/contrib"
    files = [
        "c++/src/capnp/compiler/module-loader.c++",
        "c++/src/capnp/compiler/capnp.c++",
    ]
    private_defines = ["CAPNP_INCLUDE_DIR=\"%{he.get_plugin('capnproto.capnproto')._install_dir}/c++/src\""]
    private_includedirs = ["c++/src"]
    private_dependson = ["kj", "capnp", "capnp_json", "capnp_compiler"]
    warnings = "Off"

# Capnp compiler app for C++ output
[[modules]]
    name = "capnpc-c++"
    type = "console_app"
    group = "engine/contrib"
    files = [
        "c++/src/capnp/compiler/capnpc-c++.c++",
    ]
    private_includedirs = ["c++/src"]
    private_dependson = ["kj", "capnp"]
    warnings = "Off"

# Capnp compiler app for capnp meta output
[[modules]]
    name = "capnpc-capnp"
    type = "console_app"
    group = "engine/contrib"
    files = [
        "c++/src/capnp/compiler/capnpc-capnp.c++",
    ]
    private_includedirs = ["c++/src"]
    private_dependson = ["kj", "capnp"]
    warnings = "Off"
