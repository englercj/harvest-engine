# Copyright Chad Engler

id = "boost-ext.di"
name = "[Boost::ext].DI"
description = "Header only Dependency Injection library with no dependencies."
version = "1.3.0"
author = "Kris Jusiak <krzysztof@jusiak.net>"
license = "BSL-1.0"
homepage = "https://github.com/boost-ext/di"

[install]
    github = "boost-ext/di#v1.3.0"

[[modules]]
    name = "boost_di"
    type = "header"
    group = "engine/contrib"
    files = ["include/**"]
    public_includedirs = ["include", "extension/include"]
