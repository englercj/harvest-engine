name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config: [debug, release]
        arch: [x64]
    steps:
    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential binutils-dev libdw-dev libx11-dev libxi-dev liburing-dev gcc-12 g++-12
    - name: Checkout
      uses: actions/checkout@v2
    - name: Bootstrap
      run: ./bootstrap.sh
    - name: Build
      run: cd build && make -j$(nproc) config=${{ matrix.config }}_${{ matrix.arch }}
      env:
        CC: gcc-12
        CXX: g++-12
    - name: Test
      run: ./.build/bin/linux-${{ matrix.config }}_${{ matrix.arch }}/he_test_runner
  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        config: [debug, release]
        arch: [x64]
    steps:
    - name: Checkout
      uses: actions/checkout@v2
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.0.2
    - name: Bootstrap
      run: ./bootstrap.sh
      shell: bash
    - name: Build
      run: MSBuild.exe .build/harvest-engine_windows.sln /m /p:Configuration="${{ matrix.config }}" /p:Platform="${{ matrix.arch }}" /nodeReuse:false
    - name: Test
      if: ${{ matrix.arch == 'x64' }}
      run: ./.build/windows-x86_64-${{ matrix.config }}/bin/he_test_runner.exe
