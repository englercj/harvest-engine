id = "capnproto.capnproto"
name = "Cap'n Proto"
description = "Cap'n Proto is an insanely fast data interchange format and capability-based RPC system."
version = "a3bb240667686a007f3dd0649a093b7326e130cf"
author = "Kenton Varda <kenton@cloudflare.com>"
license = "MIT"

[install]
    exec = "capnp_tool.lua"
    github = "capnproto/capnproto#a3bb240667686a007f3dd0649a093b7326e130cf"

# KJ core library
[[modules]]
    name = "kj"
    type = "static"
    group = "engine/contrib"
    files = [
        # sources - lite
        "c++/src/kj/array.c++",
        "c++/src/kj/list.c++",
        "c++/src/kj/common.c++",
        "c++/src/kj/debug.c++",
        "c++/src/kj/exception.c++",
        "c++/src/kj/io.c++",
        "c++/src/kj/memory.c++",
        "c++/src/kj/mutex.c++",
        "c++/src/kj/string.c++",
        "c++/src/kj/source-location.c++",
        "c++/src/kj/hash.c++",
        "c++/src/kj/table.c++",
        "c++/src/kj/thread.c++",
        "c++/src/kj/main.c++",
        "c++/src/kj/arena.c++",
        "c++/src/kj/test-helpers.c++",
        "c++/src/kj/units.c++",
        "c++/src/kj/encoding.c++",

        # sources - heavy
        "c++/src/kj/refcount.c++",
        "c++/src/kj/string-tree.c++",
        "c++/src/kj/time.c++",
        "c++/src/kj/filesystem.c++",
        "c++/src/kj/filesystem-disk-unix.c++",
        "c++/src/kj/filesystem-disk-win32.c++",
        "c++/src/kj/parse/char.c++",

        # headers
        "c++/src/kj/common.h",
        "c++/src/kj/units.h",
        "c++/src/kj/memory.h",
        "c++/src/kj/refcount.h",
        "c++/src/kj/array.h",
        "c++/src/kj/list.h",
        "c++/src/kj/vector.h",
        "c++/src/kj/string.h",
        "c++/src/kj/string-tree.h",
        "c++/src/kj/source-location.h",
        "c++/src/kj/hash.h",
        "c++/src/kj/table.h",
        "c++/src/kj/map.h",
        "c++/src/kj/encoding.h",
        "c++/src/kj/exception.h",
        "c++/src/kj/debug.h",
        "c++/src/kj/arena.h",
        "c++/src/kj/io.h",
        "c++/src/kj/tuple.h",
        "c++/src/kj/one-of.h",
        "c++/src/kj/function.h",
        "c++/src/kj/mutex.h",
        "c++/src/kj/thread.h",
        "c++/src/kj/threadlocal.h",
        "c++/src/kj/filesystem.h",
        "c++/src/kj/time.h",
        "c++/src/kj/main.h",
        "c++/src/kj/windows-sanity.h",
        "c++/src/kj/parse/common.h",
        "c++/src/kj/parse/char.h",
        "c++/src/kj/std/iostream.h",
    ]
    public_externalincludedirs = ["c++/src"]
    warnings = "Off"

    [[modules.variants]]
        conditions = ["system:linux"]
        public_dependson = ["sys:pthread"]

    [[modules.variants]]
        conditions = ["system:windows"]
        public_dependson = ["sys:ws2_32"]

# KJ Async library
[[modules]]
    name = "kj_async"
    type = "static"
    group = "engine/contrib"
    files = [
        # sources
        "c++/src/kj/async.c++",
        "c++/src/kj/async-unix.c++",
        "c++/src/kj/async-win32.c++",
        "c++/src/kj/async-io-win32.c++",
        "c++/src/kj/async-io.c++",
        "c++/src/kj/async-io-unix.c++",
        "c++/src/kj/timer.c++",

        # headers
        "c++/src/kj/async-prelude.h",
        "c++/src/kj/async.h",
        "c++/src/kj/async-inl.h",
        "c++/src/kj/async-unix.h",
        "c++/src/kj/async-win32.h",
        "c++/src/kj/async-io.h",
        "c++/src/kj/async-queue.h",
        "c++/src/kj/timer.h",
    ]
    public_externalincludedirs = ["c++/src"]
    public_dependson = ["kj"]
    warnings = "Off"

    [[modules.variants]]
        conditions = ["system:linux"]
        public_dependson = ["sys:pthread"]

# KJ HTTP library
[[modules]]
    name = "kj_http"
    type = "static"
    group = "engine/contrib"
    files = [
        # sources
        "c++/src/kj/compat/url.c++",
        "c++/src/kj/compat/http.c++",

        # headers
        "c++/src/kj/compat/url.h",
        "c++/src/kj/compat/http.h",
    ]
    public_externalincludedirs = ["c++/src"]
    public_dependson = ["kj", "kj_async"]
    warnings = "Off"

# KJ TLS library
[[modules]]
    name = "kj_tls"
    type = "static"
    group = "engine/contrib"
    files = [
        # sources
        "c++/src/kj/compat/readiness-io.c++",
        "c++/src/kj/compat/tls.c++",

        # headers
        "c++/src/kj/compat/readiness-io.h",
        "c++/src/kj/compat/tls.h",
    ]
    public_externalincludedirs = ["c++/src"]
    public_dependson = ["kj", "kj_async"]
    warnings = "Off"

# KJ Gzip library
[[modules]]
    name = "kj_gzip"
    type = "static"
    group = "engine/contrib"
    files = [
        # sources
        "c++/src/kj/compat/gzip.c++",

        # headers
        "c++/src/kj/compat/gzip.h",
    ]
    private_defines = ["KJ_HAS_ZLIB=1"]
    public_externalincludedirs = ["c++/src"]
    public_dependson = ["kj", "kj_async", "zlib"]
    warnings = "Off"

