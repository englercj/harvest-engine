# Copyright Chad Engler

id = "freetype"
name = "Freetype"
description = "Dear ImGui is a bloat-free graphical user interface library for C++."
version = "2.12.1"
author = "Werner Lemberg <wl@gnu.org>"
license = "FTL"
homepage = "https://freetype.org/"

[install]
    github = "freetype/freetype#VER-2-12-1"

[[modules]]
    name = "freetype"
    type = "static"
    group = "engine/contrib"
    files = [
        "src/autofit/autofit.c",
        "src/base/ftbase.c",
        "src/base/ftbbox.c",
        "src/base/ftbdf.c",
        "src/base/ftbitmap.c",
        "src/base/ftcid.c",
        "src/base/ftfstype.c",
        "src/base/ftgasp.c",
        "src/base/ftglyph.c",
        "src/base/ftgxval.c",
        "src/base/ftinit.c",
        "src/base/ftmm.c",
        "src/base/ftotval.c",
        "src/base/ftpatent.c",
        "src/base/ftpfr.c",
        "src/base/ftstroke.c",
        "src/base/ftsynth.c",
        "src/base/fttype1.c",
        "src/base/ftwinfnt.c",
        "src/bdf/bdf.c",
        "src/bzip2/ftbzip2.c",
        "src/cache/ftcache.c",
        "src/cff/cff.c",
        "src/cid/type1cid.c",
        "src/gzip/ftgzip.c",
        "src/lzw/ftlzw.c",
        "src/pcf/pcf.c",
        "src/pfr/pfr.c",
        "src/psaux/psaux.c",
        "src/pshinter/pshinter.c",
        "src/psnames/psnames.c",
        "src/raster/raster.c",
        "src/sdf/sdf.c",
        "src/sfnt/sfnt.c",
        "src/smooth/smooth.c",
        "src/svg/svg.c",
        "src/truetype/truetype.c",
        "src/type1/type1.c",
        "src/type42/type42.c",
        "src/winfonts/winfnt.c",
    ]
    private_defines = ["_LIB", "FT2_BUILD_LIBRARY", "FT_CONFIG_OPTION_SYSTEM_ZLIB"]
    public_dependson = ["zlib"]
    public_includedirs = ["include"]
    warnings = "Off"

    [[modules.variants]]
        conditions = ["system:linux or macosx"]
        private_defines = ["HAVE_UNISTD_H=1", "HAVE_FCNTL_H=1"]
        files = [
            "builds/unix/ftsystem.c",
            "src/base/ftdebug.c",
        ]

    [[modules.variants]]
        conditions = ["system:windows"]
        files = [
            "builds/windows/ftsystem.c",
            "builds/windows/ftdebug.c",
            "src/base/ftver.rc",
        ]
