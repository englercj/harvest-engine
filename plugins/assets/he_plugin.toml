# Copyright Chad Engler

id = "he.assets"
name = "Harvest Assets"
description = "Harvest asset system including editing utilities, built-in asset types, and runtime resource management."
version = "0.1.0"
author = "Chad Engler <englercj@live.com>"
license = "UNLICENSED"
homepage = ""

[[modules]]
    name = "he_assets"
    type = "static"
    group = "engine/libs"
    files = ["assets/include/**", "assets/src/**"]
    public_dependson = ["he_core", "he_schema"]
    public_includedirs = ["assets/include", "%{he.get_generated_dir('he_assets')}/assets/include"]
    private_includedirs = ["assets/src", "%{he.get_generated_dir('he_assets')}/assets/src"]

    [[modules.schema_compile]]
        glob = "**.hsc"
        targets = ["c++"]
        dependson_include = ["he_schema"]

[[modules]]
    name = "he_assets_edit"
    type = "static"
    group = "engine/libs"
    files = ["assets_edit/include/**", "assets_edit/src/**"]
    exports_module_interface = true
    public_dependson = ["he_assets", "he_core", "he_schema", "he_sqlite", "basis_universal"]
    private_dependson = ["imgui"]
    private_dependson_include = ["he_editor"]
    public_includedirs = ["assets_edit/include", "%{he.get_generated_dir('he_assets_edit')}/assets_edit/include"]
    private_includedirs = ["assets_edit/src", "%{he.get_generated_dir('he_assets_edit')}/assets_edit/src"]

    [[modules.bin2c_compile]]
        glob = "**.sql"
        text = true

    [[modules.variants]]
        conditions = ["system:windows"]
        public_dependson = ["sys:Shlwapi"]
