# Copyright Chad Engler

id = "nvidia.slang"
name = "slang"
description = "Slang is a shading language that makes it easier to build and maintain large shader codebases in a modular and extensible fashion."
version = "0.28.2"
author = "Carnegie Mellon University and NVIDIA Corporation"
license = "MIT"
homepage = "https://github.com/shader-slang/slang"

[install]
    [install.archive]
        linux = "https://github.com/shader-slang/slang/releases/download/v0.28.2/slang-0.28.2-linux-x86_64.zip"
        windows = "https://github.com/shader-slang/slang/releases/download/v0.28.2/slang-0.28.2-win64.zip"

[[modules]]
    name = "slang"
    type = "shared"
    group = "engine/contrib"
    public_includedirs = ["."]

    [[modules.variants]]
        conditions = ["system:windows", "architecture:x86_64"]
        public_dependson = [
            "file:bin/windows-x64/release/slang.lib"
        ]
        copy_files = [
            "bin/windows-x64/release/gfx.dll",
            "bin/windows-x64/release/slang.dll",
            "bin/windows-x64/release/slang-glslang.dll",
            "$(WindowsSdkDir)Redist/D3D/x64/dxcompiler.dll",
            "$(WindowsSdkDir)Redist/D3D/x64/dxil.dll",
        ]

    [[modules.variants]]
        conditions = ["system:linux", "architecture:x86_64"]
        copy_files = [
            "bin/linux-x64/release/libgfx.so",
            "bin/linux-x64/release/libslang.so",
            "bin/linux-x64/release/libslang-glslang.so",
        ]
