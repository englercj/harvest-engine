# Copyright Chad Engler

id = "he.assets"
name = "Harvest Assets"
description = "Harvest asset system including editing utilities, built-in asset types, and runtime resource management."
version = "0.1.0"
authors = ["Chad Engler <englercj@live.com>"]
license = "UNLICENSED"
homepage = ""

[[modules]]
    name = "he_assets"
    type = "static"
    group = "engine/libs"
    files = ["assets/include/**", "assets/src/**"]
    public_dependson = ["he_core", "he_schema"]
    public_includedirs = ["assets/include"]
    private_includedirs = ["assets/src"]

    [[modules.schema_compile]]
        scope = "public"
        files = ["assets/include/**.hsc"]
        includedirs = ["assets/include"]
        targets = ["c++"]
        dependson = ["he_editor"]

[[modules]]
    name = "he_assets_editor"
    type = "static"
    group = "engine/libs"
    files = ["assets_editor/include/**", "assets_editor/src/**"]
    public_dependson = ["he_assets", "he_core", "he_schema", "he_sqlite", "basis_universal"]
    private_dependson = ["imgui"]
    private_dependson_include = ["he_editor"]
    public_includedirs = ["assets_editor/include"]
    private_includedirs = ["assets_editor/src"]

    [[modules.variants]]
        conditions = ["system:windows"]
        public_dependson = ["sys:Shlwapi"]
