# Copyright Chad Engler

id = "he.editor"
name = "Harvest Editor"
description = "Harvest Editor application."
version = "0.1.0"
author = "Chad Engler <englercj@live.com>"
license = "UNLICENSED"
homepage = ""

[[modules]]
    name = "he_editor"
    type = "windowed_app"
    group = "engine/tools"
    files = ["src/**"]
    public_includedirs = ["src", "%{he.get_generated_dir('he_editor')}/src"]
    private_dependson = [
        "he_assets",
        "he_assets_edit",
        "he_core",
        "he_math",
        "he_rhi",
        "he_schema",
        "he_window",

        "boost_di",
        "imgui",
        "implot",
        "sqlite3",
    ]

    [[modules.bin2c_compile]]
        files = ["src/fonts/**.ttf"]
        compress = true

    [[modules.bin2c_compile]]
        files = ["src/fonts/**.woff2"]
        compress = false

    [[modules.schema_compile]]
        files = ["src/schema/*.hsc"]
        targets = ["c++"]
        dependson_include = ["he_assets", "he_schema"]

    [[modules.variants]]
        conditions = ["system:windows"]
        disablewarnings = ["4127", "5054"]
        public_dependson = ["sys:Shlwapi"]

        [[modules.variants.shader_compile]]
            files = ["src/shaders/*.hlsl"]
            targets = ["sm_5_1"]

    [[modules.variants]]
        conditions = ["system:linux"]

        [[modules.variants.shader_compile]]
            files = ["src/shaders/*.hlsl"]
            targets = ["glsl_450"]
