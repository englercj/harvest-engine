# Copyright Chad Engler

id = "he.rhi"
name = "Harvest RHI"
description = "The Rendering Hardware Interface (RHI) abstracts low level platform rendering APIs."
version = "0.1.0"
author = "Chad Engler <englercj@live.com>"
license = "UNLICENSED"
homepage = ""

[install]
    exec = "shaderc.lua"

[[modules]]
    name = "he_rhi"
    type = "static"
    group = "engine/libs"
    files = ["include/**", "src/**"]
    public_dependson = ["he_core", "he_math"]
    public_includedirs = ["include"]
    private_includedirs = ["src"]

    [[modules.variants]]
        conditions = ["system:windows"]
        public_dependson = ["WinPixEventRuntime"]

[[modules]]
    name = "he_shaderc"
    type = "console_app"
    group = "engine/tools"
    files = ["compiler/**"]
    private_dependson = ["he_core", "slang"]
    private_dependson_include = ["he_rhi"]
